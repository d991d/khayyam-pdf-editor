name: Build Windows Installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach the installer to (must exist)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

env:
  PYTHONUTF8: "1"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Windows
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller Pillow

      - name: Generate icon.ico
        run: python make_icon.py

      - name: Bundle with PyInstaller
        run: pyinstaller khayyam.spec --noconfirm --clean

      - name: Verify bundle
        run: |
          if (-not (Test-Path "dist\Khayyam PDF Editor\Khayyam PDF Editor.exe")) {
            Write-Error "Expected exe not found after build."
          }

      - name: Compile installer (Inno Setup)
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss
          Get-ChildItem installer

      - name: Upload installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrEmpty($tag)) { $tag = "${{ github.ref_name }}" }
          gh release upload $tag (Get-ChildItem installer\*.exe).FullName --clobber --repo ${{ github.repository }}
